spring.application.name=pos

spring.datasource.url=jdbc:mariadb://localhost:3306/posdb
spring.datasource.username=mapalo
spring.datasource.password=mapalo
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=8080

spring.devtools.restart.enabled=true
spring.devtools.restart.poll-interval=1s
spring.devtools.restart.quiet-period=500ms
spring.devtools.livereload.enabled=true
spring.devtools.restart.additional-paths=build/classes/java/main